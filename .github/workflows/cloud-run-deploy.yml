name: Cloud Run Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cloud-run-deploy.yml"
      - "apps/web/**"
      - "packages/**"
      - "supabase/migrations/**"
  workflow_dispatch:

concurrency:
  group: cloud-run-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'sparkcore-492512' }}
      REGION: ${{ vars.GCP_REGION || 'asia-east1' }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE_NAME || 'sparkcore-web' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: bash apps/web/scripts/cloud-run-deploy.sh
