name: Web Smoke

on:
  pull_request:
    paths:
      - ".github/workflows/web-smoke.yml"
      - "apps/web/**"
      - "supabase/migrations/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/web-smoke.yml"
      - "apps/web/**"
      - "supabase/migrations/**"
  workflow_dispatch:
    inputs:
      suite:
        description: "Smoke suite to run"
        required: false
        default: full
        type: choice
        options:
          - deploy
          - full
  schedule:
    - cron: "0 19 * * *"

concurrency:
  group: web-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - run: npm run typecheck

  deploy-smoke:
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'deploy')
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
      NEXT_PUBLIC_CLARITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_CLARITY_PROJECT_ID }}
      CREEM_API_KEY: ${{ secrets.CREEM_API_KEY }}
      CREEM_WEBHOOK_SECRET: ${{ secrets.CREEM_WEBHOOK_SECRET }}
      CREEM_PRICE_PRO_MONTHLY: ${{ secrets.CREEM_PRICE_PRO_MONTHLY }}
      CREEM_PRICE_PRO_QUARTERLY: ${{ secrets.CREEM_PRICE_PRO_QUARTERLY }}
      CREEM_PRICE_PRO_YEARLY: ${{ secrets.CREEM_PRICE_PRO_YEARLY }}
      CREEM_PRICE_CREDITS_100: ${{ secrets.CREEM_PRICE_CREDITS_100 }}
      CREEM_PRICE_CREDITS_250: ${{ secrets.CREEM_PRICE_CREDITS_250 }}
      CREEM_PRICE_CREDITS_700: ${{ secrets.CREEM_PRICE_CREDITS_700 }}
      PLAYWRIGHT_SMOKE_SECRET: sparkcore-smoke-local
      PLAYWRIGHT_SMOKE_EMAIL: smoke@example.com
      PLAYWRIGHT_SMOKE_PASSWORD: SparkcoreSmoke123!
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run smoke:deploy

  full-smoke:
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'full')
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
      NEXT_PUBLIC_CLARITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_CLARITY_PROJECT_ID }}
      CREEM_API_KEY: ${{ secrets.CREEM_API_KEY }}
      CREEM_WEBHOOK_SECRET: ${{ secrets.CREEM_WEBHOOK_SECRET }}
      CREEM_PRICE_PRO_MONTHLY: ${{ secrets.CREEM_PRICE_PRO_MONTHLY }}
      CREEM_PRICE_PRO_QUARTERLY: ${{ secrets.CREEM_PRICE_PRO_QUARTERLY }}
      CREEM_PRICE_PRO_YEARLY: ${{ secrets.CREEM_PRICE_PRO_YEARLY }}
      CREEM_PRICE_CREDITS_100: ${{ secrets.CREEM_PRICE_CREDITS_100 }}
      CREEM_PRICE_CREDITS_250: ${{ secrets.CREEM_PRICE_CREDITS_250 }}
      CREEM_PRICE_CREDITS_700: ${{ secrets.CREEM_PRICE_CREDITS_700 }}
      PLAYWRIGHT_SMOKE_SECRET: sparkcore-smoke-local
      PLAYWRIGHT_SMOKE_EMAIL: smoke@example.com
      PLAYWRIGHT_SMOKE_PASSWORD: SparkcoreSmoke123!
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run smoke:test
